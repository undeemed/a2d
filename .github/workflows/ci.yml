name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      # uv is needed so the exit-criterion e2e test spawns the real worker instead
      # of silently skipping (crates/a2d-cli/tests/e2e.rs skips when uv is absent).
      - uses: astral-sh/setup-uv@v5
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy
      - run: uv run pytest

  codegen-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      # Regenerate schema + pydantic models from the Rust source of truth; any
      # drift from the checked-in files fails the build (SPEC-HANDOFF section 3.3).
      - run: bash scripts/codegen.sh
      - name: Fail on contract drift
        run: git diff --exit-code schema/ packages/a2d-contracts/
