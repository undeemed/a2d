[project]
name = "a2d-worker-hf"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = ["a2d-contracts", "pydantic>=2"]

[project.scripts]
a2d-worker = "a2d_core.worker:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/a2d_core"]

[tool.uv.sources]
a2d-contracts = { workspace = true }
