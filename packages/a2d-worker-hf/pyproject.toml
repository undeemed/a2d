[project]
name = "a2d-worker-hf"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "a2d-contracts",
    "pydantic>=2",
    "torch",
    # Pinned: Decision 2 patches HF's eager attention seams directly. 4.51.3 is the
    # first pin that ships Gemma 3 (`gemma3_text`); the GPT-2 `eager_attention_forward`
    # signature and the Gemma 1 `_update_causal_mask` seam are unchanged from 4.48.3.
    "transformers==5.13.1",
    "accelerate",
    "safetensors",
]

[project.scripts]
a2d-worker = "a2d_core.worker:main"
a2d-sample = "a2d_core.sample_main:main"
a2d-eval = "a2d_core.eval_main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/a2d_core"]

[tool.uv.sources]
a2d-contracts = { workspace = true }
