name: Feature request
description: Propose new functionality or a new supported model/capability
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: >-
        What should a2d do? If this is model/capability support, note which
        extension point it maps to (SPEC-HANDOFF section 3.3) - new adapter,
        transform handler, objective, format normalizer, or eval task.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
