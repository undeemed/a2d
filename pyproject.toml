[tool.uv.workspace]
members = ["packages/*"]

[tool.uv]
dev-dependencies = [
    "ruff",
    "mypy",
    "pytest",
    "datamodel-code-generator",
]

# This container has no GPU. Pin torch to the CPU-only PyTorch wheel index so
# `uv sync`/`uv lock` resolve the ~100MB `+cpu` build instead of the default
# Linux wheel that drags in ~3GB of NVIDIA CUDA libraries. `explicit = true`
# means only packages that name this index in [tool.uv.sources] use it.
[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[tool.uv.sources]
torch = { index = "pytorch-cpu" }

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.per-file-ignores]
# Generated pydantic models: long Field descriptions come from schema docs;
# ruff format cannot wrap string literals.
"packages/a2d-contracts/src/a2d_contracts/models/*" = ["E501"]

[tool.mypy]
strict = true
files = ["packages"]
exclude = "packages/a2d-contracts/src/a2d_contracts/models"

# transformers ships no py.typed marker; the worker's transform layer patches its
# GPT-2 eager seam directly, so treat it as untyped rather than erroring.
[[tool.mypy.overrides]]
module = ["transformers.*", "tokenizers.*"]
ignore_missing_imports = true
